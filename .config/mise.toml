[settings]
env_shell_expand = true
status.show_env = true

[env]
RUST_TEST_THREADS = "1"
TASKWARRIOR_REPO_URL = "https://github.com/GothenburgBitFactory/taskwarrior.git"
TASKWARRIOR_SOURCE = "v3.3.0"
TASKWARRIOR_SOURCE_DIR = "{{config_root}}/tmp/taskwarrior-src"
TASKWARRIOR_BUILD_DIR = "{{config_root}}/tmp/taskwarrior-build/{{env.TASKWARRIOR_SOURCE}}"
TASKWARRIOR_INSTALL_DIR = "{{config_root}}/tmp/taskwarrior-install/{{env.TASKWARRIOR_SOURCE}}"
TASKWARRIOR_TESTDATA_REPO_URL = "https://github.com/kdheepak/taskwarrior-testdata"
TASKWARRIOR_TESTDATA_REF = "149099b69457404e20e73b428db00c7e88aca8d3"
TASKWARRIOR_TESTDATA_DIR = "{{config_root}}/tests/data"
TASKRC = "{{config_root}}/tests/data/.taskrc"
TASKDATA = "{{config_root}}/tests/data/.task"
TASKWARRIOR_TUI_CONFIG = "{{config_root}}/tests/data/.config"
TASKWARRIOR_TUI_DATA = "{{config_root}}/tests/data/.data"
TASKWARRIOR_TUI_LOG_LEVEL = "debug"
_.path = "{{env.TASKWARRIOR_INSTALL_DIR}}/bin"

[tools]
rust = { version = "latest", postinstall = "mise run taskwarrior-tui:ensure-rust-toolchain" }
uv = "latest"
"aqua:Kitware/CMake" = "latest"
"github:jgm/pandoc" = "latest"
"cargo:cross" = "latest"
"cargo:grcov" = "latest"
"cargo:cargo-deb" = "latest"
"cargo:cargo-rpm" = "latest"
"cargo:cargo-aur" = "latest"

[tasks."taskwarrior-tui:cargo-fmt"]
depends=["taskwarrior-tui:ensure-rust-toolchain"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks."taskwarrior-tui:cargo-check"]
depends=["taskwarrior-tui:ensure-rust-toolchain"]
description = "Run cargo check"
run = "cargo check"

[tasks."taskwarrior-tui:cargo-test"]
description = "Run cargo test against pinned test fixtures"
depends=["taskwarrior-tui:ensure-rust-toolchain", "taskwarrior-tui:setup-testdata"]
run = "cargo test --workspace -- --nocapture"

[tasks."taskwarrior-tui:cargo-clippy"]
depends=["taskwarrior-tui:ensure-rust-toolchain"]
description = "Run clippy with warnings denied"
run = "cargo clippy -- -D warnings"

[tasks."taskwarrior-tui:cargo-clean"]
depends=["taskwarrior-tui:ensure-rust-toolchain"]
description = "Clean the cargo build artifacts"
run = "cargo clean"

[tasks."taskwarrior-tui:clean-taskdata"]
description = "Remove tests/data/.task"
run = "rm -rf \"$TASKDATA\""

[tasks."taskwarrior-tui:clean-tests"]
description = "Delete cloned test fixtures"
run = "rm -rf \"$TASKWARRIOR_TESTDATA_DIR\""

[tasks."taskwarrior-tui:import-taskdata"]
description = "Import tests/data/export.json into tests/data/.task"
depends=["taskwarrior-tui:setup-testdata"]
run = "task import rc.hooks=0 tests/data/export.json"

[tasks."taskwarrior-tui:man"]
description = "Generate the roff man page from Markdown"
run = "pandoc --standalone --to=man docs/taskwarrior-tui.1.md -o docs/taskwarrior-tui.1"

[tasks."taskwarrior-tui:package-aur"]
description = "Build the AUR package metadata"
run = "cargo aur"

[tasks."taskwarrior-tui:package-deb"]
description = "Build the Debian package"
run = "cargo deb -p taskwarrior-tui -o target/debian/taskwarrior-tui.deb"

[tasks."taskwarrior-tui:package-rpm"]
description = "Build the RPM package"
run = "cargo rpm build"

[tasks."taskwarrior-tui:coverage"]
depends=["taskwarrior-tui:ensure-rust-toolchain"]
description = "Generate lcov output with grcov"
run = [
  "mkdir -p ./target/debug/coverage/",
  "grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o ./target/debug/coverage/",
]

[tasks."taskwarrior-tui:ci"]
description = "CI - format, check, test, clippy"
depends=["taskwarrior-tui:ensure-rust-toolchain"]
run = [
  { task = "taskwarrior-tui:cargo-fmt" },
  { task = "taskwarrior-tui:cargo-check" },
  { task = "taskwarrior-tui:cargo-test" },
  { task = "taskwarrior-tui:cargo-clippy" },
]
