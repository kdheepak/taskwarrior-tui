name: generate_coverage

on:
  workflow_call

jobs:
  grcov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          mise_toml: |
            [tools]
            rust = { version = "nightly", profile = "minimal", components = "cargo,llvm-tools-preview" }
            uv = "latest"
            cmake = "latest"
            "cargo:grcov" = "latest"
      - name: Install Taskwarrior build dependencies
        run: sudo apt-get update && sudo apt-get install -y uuid-dev uuid-runtime
      - name: Build Taskwarrior from source
        run: uv run scripts/build_taskwarrior.py
      - name: Add Taskwarrior to PATH
        run: echo "$GITHUB_WORKSPACE/target/taskwarrior-install/stable/bin" >> "$GITHUB_PATH"
      - run: |
          # prepare taskwarrior, initial setup
          task rc.confirmation=off || echo 0

      - name: Checkout testdata
        uses: actions/checkout@v6
        with:
          repository: kdheepak/taskwarrior-testdata
          path: taskwarrior-testdata    
      - name: Build taskwarrior-tui with coverage
        run: cargo build
        env:
          RUSTFLAGS: "-Cinstrument-coverage"  
      - name: Run taskwarrior-tui tests in coverage environment
        run: cargo test --workspace -- --nocapture
        env:
          TASKRC: taskwarrior-testdata/.taskrc
          TASKDATA: taskwarrior-testdata/.task
          RUST_BACKTRACE: full
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "your_name-%p-%m.profraw"

      - name: Gather coverage data
        run: |
          mkdir -p ./target/debug/coverage/
          grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o ./target/debug/coverage/
      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./target/debug/coverage/lcov
