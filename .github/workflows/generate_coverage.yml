name: generate_coverage

on:
  workflow_call

jobs:
  grcov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - name: Restore cached Taskwarrior build
        id: taskwarrior-cache
        uses: actions/cache@v4
        with:
          path: .config/tmp/taskwarrior-install
          key: ${{ runner.os }}-taskwarrior-${{ hashFiles('.config/mise.toml', '.config/mise/tasks/taskwarrior-tui/build-taskwarrior') }}
      - name: Install Taskwarrior build dependencies
        run: sudo apt-get update && sudo apt-get install -y uuid-dev uuid-runtime
      - name: Build Taskwarrior from source
        if: steps.taskwarrior-cache.outputs.cache-hit != 'true'
        run: mise run taskwarrior-tui:build-taskwarrior
      - run: |
          # prepare taskwarrior, initial setup
          mise exec -- task rc.confirmation=off || echo 0

      - name: Build taskwarrior-tui with coverage
        run: cargo build
        env:
          RUSTFLAGS: "-Cinstrument-coverage"
      - name: Run taskwarrior-tui tests in coverage environment
        run: mise run taskwarrior-tui:cargo-test
        env:
          RUST_BACKTRACE: full
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "your_name-%p-%m.profraw"

      - name: Gather coverage data
        run: mise run taskwarrior-tui:coverage
      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./target/debug/coverage/lcov
