name: Check Pull Requests

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - labeled
      - unlabeled
  merge_group:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        if: github.event_name == 'pull_request_target'
        uses: amannn/action-semantic-pull-request@v6
        id: check_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Add comment indicating we require pull request titles to follow conventional commits specification
      - uses: marocchino/sticky-pull-request-comment@v3
        if: always() && (steps.check_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            Thank you for opening this pull request!

            We require pull request titles to follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) and it looks like your proposed title needs to be adjusted.

            Details:

            > ${{ steps.check_pr_title.outputs.error_message }}

      # Delete a previous comment when the issue has been resolved
      - if: ${{ steps.check_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint-error
          delete: true

  check-breaking-change-label:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    env:
      # use an environment variable to pass untrusted input to the script
      # see https://securitylab.github.com/research/github-actions-untrusted-input/
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
    - name: Check breaking change label
      id: check_breaking_change
      run: |
        pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\(\w+\))?!:'
        # Check if pattern matches
        if echo "${PR_TITLE}" | grep -qE "$pattern"; then
          echo "breaking_change=true" >> $GITHUB_OUTPUT
        else
          echo "breaking_change=false" >> $GITHUB_OUTPUT
        fi
    - name: Sync breaking-change label
      uses: actions/github-script@v8
      env:
        BREAKING_CHANGE: ${{ steps.check_breaking_change.outputs.breaking_change }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const label = 'Type: Breaking Change';
          const shouldHaveLabel = process.env.BREAKING_CHANGE === 'true';
          const params = {
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
          };

          if (shouldHaveLabel) {
            await github.rest.issues.addLabels({
              ...params,
              labels: [label],
            });
            return;
          }

          try {
            await github.rest.issues.removeLabel({
              ...params,
              name: label,
            });
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
          }

  do-not-merge:
    if: ${{ contains(github.event.*.labels.*.name, 'do not merge') }}
    name: Prevent Merging
    runs-on: ubuntu-latest
    steps:
      - name: Check for label
        run: |
          echo "Pull request is labeled as 'do not merge'"
          echo "This workflow fails so that the pull request cannot be merged"
          exit 1
