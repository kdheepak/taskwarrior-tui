[settings]
env_shell_expand = true
lockfile = true

[env]
RUST_TEST_THREADS = "1"

[tools]
rust = { version = "latest", profile = "minimal", components = "cargo,rustfmt,clippy" }
# Convert markdown to word, pdf etc
"github:jgm/pandoc" = "latest"
"cargo:cross" = "latest"

[tasks.clean-tests]
description = "Delete cloned test fixtures"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -d tests/data ]; then
  rm -rf tests/data
fi
'''

[tasks.setup-tests]
description = "Clone the test fixtures used by cargo test"
depends = ["clean-tests"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p tests
git clone https://github.com/kdheepak/taskwarrior-testdata tests/data
'''

[tasks.test]
description = "Clone fresh test fixtures and run cargo test"
depends = ["setup-tests"]
run = "cargo test"

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.build]
description = "Build the CLI"
run = "cargo build"
alias = "b"
depends = ["clean"]
sources = ['Cargo.toml', 'src/**/*.rs']
outputs = ['target/debug/taskwarrior-tui']

[tasks.build-release]
description = "Build the CLI in release mode"
run = "cargo build --release"

[tasks.format]
alias = "fmt"
description = "Format the code"
run = "cargo fmt"

[tasks.check-rust]
description = "Run cargo check"
run = "cargo check"

[tasks.test-rust]
description = "Run the Rust test suite"
run = "cargo test --workspace -- --nocapture"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy-strict]
description = "Run clippy with warnings denied"
run = "cargo clippy -- -D warnings"

[tasks.ci]
description = "CI - format, check, test, clippy"
run = """
cargo check
cargo test
cargo clippy -- -D warnings
"""

[tasks.lint]
description = 'Lint with clippy'
env = { RUST_BACKTRACE = '1' }
run = '''
#!/usr/bin/env bash
cargo clippy
'''

[tasks.docs-build]
description = "Build the MkDocs site"
run = "uv run scripts/build_docs.py"

[tasks.man]
description = "Generate the roff man page from Markdown"
run = "pandoc --standalone --to=man docs/taskwarrior-tui.1.md -o docs/taskwarrior-tui.1"

[tasks.coverage-lcov]
description = "Generate lcov output with grcov"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p ./target/debug/coverage/
grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o ./target/debug/coverage/
'''

[tasks.package-deb]
description = "Build the Debian package"
run = "cargo deb -p taskwarrior-tui -o target/debian/taskwarrior-tui.deb"

[tasks.package-rpm]
description = "Build the RPM package"
run = "cargo rpm build"

[tasks.package-aur]
description = "Build the AUR package metadata"
run = "cargo aur"

# Builds Taskwarrior into target/taskwarrior-install/stable/bin/task by default.
# Set TASKWARRIOR_BRANCH=develop to build the upstream development branch instead.
[tasks.build-taskwarrior]
description = "Clone/update upstream Taskwarrior and build the task binary from source"
run = "uv run scripts/build_taskwarrior.py"
