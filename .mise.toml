[settings]
env_shell_expand = true
lockfile = true

[env]
RUST_TEST_THREADS = "1"
TASKWARRIOR_BRANCH = "stable"
TASKWARRIOR_INSTALL_DIR = "{{config_root}}/target/taskwarrior-install/{{env.TASKWARRIOR_BRANCH}}"
TASKWARRIOR_TESTDATA_DIR = "{{config_root}}/tests/data"
TASKRC = "{{config_root}}/tests/data/.taskrc"
TASKDATA = "{{config_root}}/tests/data/.task"
TASKWARRIOR_TUI_CONFIG = "{{config_root}}/tests/data/.config"
TASKWARRIOR_TUI_DATA = "{{config_root}}/tests/data/.data"
TASKWARRIOR_TUI_LOG_LEVEL = "debug"
_.path = "{{env.TASKWARRIOR_INSTALL_DIR}}/bin"

[tools]
rust = { version = "latest", postinstall = "mise run ensure-rust-toolchain" }
uv = "latest"
"aqua:Kitware/CMake" = "latest"
"github:jgm/pandoc" = "latest"
"cargo:cross" = "latest"
"cargo:grcov" = "latest"
"cargo:cargo-deb" = "latest"
"cargo:cargo-rpm" = "latest"
"cargo:cargo-aur" = "latest"

[tasks.ensure-rust-toolchain]
description = "Install Rust toolchain components and optional targets via rustup"
file = "scripts/ensure_rust_toolchain.py"

[tasks.clean-tests]
description = "Delete cloned test fixtures"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -d "$TASKWARRIOR_TESTDATA_DIR" ]; then
  rm -rf "$TASKWARRIOR_TESTDATA_DIR"
fi
'''

[tasks.setup-tests]
description = "Fetch pinned test fixtures used by cargo test"
depends = ["clean-tests"]
run = "./scripts/setup_testdata.sh"

[tasks.test]
alias = "test-rust"
description = "Run cargo test against pinned test fixtures"
depends = ["setup-tests"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

cargo test --workspace -- --nocapture
'''

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.build]
description = "Build the CLI"
run = "cargo build"
alias = "b"
depends = ["clean"]
sources = ['Cargo.toml', 'src/**/*.rs']
outputs = ['target/debug/taskwarrior-tui']

[tasks.build-release]
description = "Build the CLI in release mode"
run = "cargo build --release"

[tasks.format]
alias = "fmt"
description = "Format the code"
run = "cargo fmt"

[tasks.check-rust]
description = "Run cargo check"
run = "cargo check"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy-strict]
description = "Run clippy with warnings denied"
run = "cargo clippy -- -D warnings"

[tasks.ci]
description = "CI - format, check, test, clippy"
depends = ["setup-tests"]
run = """
cargo fmt --all -- --check
cargo check
cargo test --workspace -- --nocapture
cargo clippy -- -D warnings
"""

[tasks.lint]
description = 'Lint with clippy'
env = { RUST_BACKTRACE = '1' }
run = '''
#!/usr/bin/env bash
cargo clippy
'''

[tasks.docs-build]
description = "Build the MkDocs site"
run = "uv run scripts/build_docs.py"

[tasks.man]
description = "Generate the roff man page from Markdown"
run = "pandoc --standalone --to=man docs/taskwarrior-tui.1.md -o docs/taskwarrior-tui.1"

[tasks.coverage-lcov]
description = "Generate lcov output with grcov"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p ./target/debug/coverage/
grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o ./target/debug/coverage/
'''

[tasks.package-deb]
description = "Build the Debian package"
run = "cargo deb -p taskwarrior-tui -o target/debian/taskwarrior-tui.deb"

[tasks.package-rpm]
description = "Build the RPM package"
run = "cargo rpm build"

[tasks.package-aur]
description = "Build the AUR package metadata"
run = "cargo aur"

# Builds Taskwarrior into target/taskwarrior-install/stable/bin/task by default.
# Set TASKWARRIOR_BRANCH=develop to build the upstream development branch instead.
[tasks.build-taskwarrior]
description = "Clone/update upstream Taskwarrior and build the task binary from source"
run = "uv run scripts/build_taskwarrior.py"
